<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#ffffff" />
  <title>쓰레기봉투 어디 있어?</title>
  <meta name="description" content="내 주변 종량제봉투 판매처 지도 — GPS로 찾기, 가격 확인, 재고 신고" />
  <script>window.kakaoLoadError = false;</script>
  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9b2d956d02e8bd8ad58de3641a8c8c62&libraries=services,clusterer"
    onerror="window.kakaoLoadError=true"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root, html[data-theme], body {
      color-scheme: light only;
    }
    @media (prefers-color-scheme: dark) {
      :root { color-scheme: light; }
    }
    :root {
      --blue: #0064FF;
      --blue-light: #EBF3FF;
      --green: #00B493;
      --green-light: #E6FAF6;
      --red: #F04452;
      --red-light: #FFF0F1;
      --gray50: #F9FAFB;
      --gray100: #F2F4F6;
      --gray200: #E8EAED;
      --gray400: #B0B8C1;
      --gray600: #6B7684;
      --gray800: #333D4B;
      --black: #191F28;
      --white: #FFFFFF;
    }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: #F2F4F6 !important;
      color: #191F28 !important;
    }

    /* ── 헤더 ──────────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #ffffff !important;
      padding: 0 16px;
      height: 56px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #E8EAED;
    }
    #header-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    #header h1 {
      font-size: 17px; font-weight: 700; color: #191F28 !important;
      white-space: nowrap;
    }
    .header-badge {
      background: #FFF0F1; color: #F04452;
      font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px;
      white-space: nowrap;
    }
    #region-label {
      font-size: 12px; color: #B0B8C1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 100px;
    }
    #gps-btn {
      background: #0064FF; color: #ffffff !important;
      border: none; border-radius: 10px;
      padding: 8px 14px; font-size: 13px; font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    #gps-btn:active { opacity: 0.85; }

    /* ── 검색바 ─────────────────────────────────── */
    #search-bar {
      position: fixed; top: 56px; left: 0; right: 0; z-index: 99;
      background: #ffffff; border-bottom: 1px solid #E8EAED;
      padding: 8px 12px; display: flex; gap: 8px;
    }
    #search-input {
      flex: 1; border: 1.5px solid #E8EAED; border-radius: 10px;
      padding: 9px 14px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
      outline: none; color: #191F28; background: #F9FAFB;
    }
    #search-input:focus { border-color: #0064FF; background: #fff; }
    #search-btn {
      background: #0064FF; color: #fff; border: none; border-radius: 10px;
      padding: 9px 16px; font-size: 13px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer; white-space: nowrap;
    }

    /* ── 재검색 버튼 ──────────────────────────────── */
    #re-search-btn {
      position: fixed; top: 122px; left: 50%; transform: translateX(-50%);
      z-index: 99; background: #191F28; color: #fff;
      border: none; border-radius: 20px; padding: 9px 20px;
      font-size: 13px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; white-space: nowrap; display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    #re-search-btn:active { opacity: 0.85; }

    /* ── 지도 ──────────────────────────────────── */
    #map { position: fixed; top: 110px; left: 0; right: 0; bottom: 0; }

    /* ── 가격 바 ────────────────────────────────── */
    #price-bar {
      position: fixed; top: 118px; left: 12px; right: 12px; z-index: 98;
      background: #ffffff !important;
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: none;
      font-size: 12px; color: #6B7684;
    }
    #price-bar .pb-row {
      display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    }
    #price-bar .pb-region {
      font-weight: 700; color: #191F28 !important; font-size: 13px; margin-right: 4px;
    }
    #price-bar .pb-sep { color: #E8EAED; }
    #price-bar .pb-item b { color: #0064FF !important; font-weight: 700; }

    /* ── 범례 ───────────────────────────────────── */
    #legend {
      position: fixed; bottom: 208px; right: 12px; z-index: 99;
      background: #ffffff !important;
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      font-size: 11px; color: #6B7684 !important;
    }
    #legend div { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    #legend div:last-child { margin-bottom: 0; }
    .ldot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── 하단 패널 ──────────────────────────────── */
    #panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: #ffffff !important;
      border-radius: 20px 20px 0 0;
      padding: 0 20px 36px;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
      min-height: 190px;
    }
    .panel-handle {
      width: 36px; height: 4px;
      background: var(--gray200); border-radius: 2px;
      margin: 12px auto 18px;
    }

    /* 기본 패널 */
    #panel-default { }
    .crisis-row {
      display: flex; align-items: center; gap: 8px;
      background: #FFF0F1; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 12px;
    }
    .crisis-icon { font-size: 20px; }
    .crisis-text { flex: 1; }
    .crisis-title { font-size: 14px; font-weight: 700; color: #F04452 !important; }
    .crisis-desc { font-size: 12px; color: #6B7684 !important; margin-top: 2px; line-height: 1.5; }

    .guide-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      background: #F9FAFB; border-radius: 12px;
    }
    .guide-row p { font-size: 13px; color: #333D4B !important; line-height: 1.6; }
    .guide-row p b { color: #191F28 !important; font-weight: 700; }

    /* 가게 패널 */
    #panel-store { display: none; }
    .store-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    }
    .store-brand-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--gray100); display: flex; align-items: center;
      justify-content: center; font-size: 22px; flex-shrink: 0;
    }
    .store-meta { flex: 1; min-width: 0; }
    .store-name {
      font-size: 16px; font-weight: 700; color: #191F28 !important;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .store-addr {
      font-size: 12px; color: #B0B8C1 !important; margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .store-dist {
      font-size: 12px; color: #0064FF !important; font-weight: 600; margin-top: 2px;
    }

    /* 가격 칩 */
    .price-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .p-chip {
      background: #F2F4F6; border-radius: 8px;
      padding: 5px 10px; font-size: 12px; color: #6B7684;
      display: flex; flex-direction: column; align-items: center; gap: 1px;
    }
    .p-chip .sz { font-size: 11px; color: #B0B8C1 !important; }
    .p-chip .price { font-weight: 700; color: #191F28 !important; font-size: 13px; }

    /* 재고 신고 버튼 */
    .report-btns { display: flex; gap: 8px; }
    .btn-yes, .btn-no {
      flex: 1; border: none; border-radius: 12px;
      padding: 13px; font-size: 14px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    }
    .btn-yes { background: #00B493; color: #ffffff !important; }
    .btn-no  { background: #FFF0F1; color: #F04452 !important; }
    .btn-yes:active { opacity: 0.85; }
    .btn-no:active  { opacity: 0.85; }

    .report-status {
      text-align: center; font-size: 12px; color: #B0B8C1 !important;
      margin-top: 10px;
    }

    /* ── 마커 ───────────────────────────────────── */
    .cmarker {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid var(--white);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .cmarker.green  { background: var(--green); }
    .cmarker.red    { background: var(--red); }
    .cmarker.gray   { background: var(--gray400); }
    .cmarker.me     { background: var(--blue); }
    .cmarker.official { border: 3px solid #F5A623; box-shadow: 0 0 0 2px rgba(245,166,35,0.3), 0 2px 8px rgba(0,0,0,0.18); }

    /* ── 로딩 ───────────────────────────────────── */
    #loading {
      position: fixed; inset: 0; z-index: 999;
      background: #ffffff !important;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .spin { font-size: 48px; animation: spin 1.5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 15px; font-weight: 600; color: #191F28 !important; }
    #loading small { font-size: 12px; color: #B0B8C1 !important; margin-top: -8px; }

    /* ── 토스트 ─────────────────────────────────── */
    #toast {
      position: fixed; bottom: 220px; left: 50%; transform: translateX(-50%);
      background: #191F28; color: #ffffff !important;
      padding: 10px 18px; border-radius: 24px;
      font-size: 13px; font-weight: 500;
      z-index: 200; display: none; white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spin">🗑️</div>
  <p>내 주변 판매처 찾는 중...</p>
  <small>위치 권한을 허용해주세요</small>
</div>

<div id="toast"></div>

<div id="header">
  <div id="header-left">
    <h1>쓰레기봉투 어디 있어?</h1>
    <span class="header-badge">품귀 대란</span>
  </div>
  <span id="region-label"></span>
  <button id="gps-btn" onclick="locateUser()">📍 내 위치</button>
</div>

<div id="search-bar">
  <input id="search-input" type="text" placeholder="🔍  동네, 주소, 장소 검색"
    onkeydown="if(event.key==='Enter') doSearch()" />
  <button id="search-btn" onclick="doSearch()">검색</button>
</div>

<button id="re-search-btn" onclick="reSearch()">🔄 이 지역 재검색</button>

<div id="map"></div>

<div id="price-bar"></div>

<div id="legend">
  <div><span class="ldot" style="background:var(--green)"></span> 재고 있음</div>
  <div><span class="ldot" style="background:var(--red)"></span> 품절</div>
  <div><span class="ldot" style="background:var(--gray400)"></span> 미확인</div>
  <div><span class="ldot" style="background:var(--gray400);border:2px solid #F5A623"></span> 공식 지정</div>
</div>

<div id="panel">
  <div class="panel-handle"></div>

  <div id="panel-default">
    <div class="crisis-row">
      <div class="crisis-icon">🚨</div>
      <div class="crisis-text">
        <div class="crisis-title">종량제봉투 품귀 대란 중</div>
        <div class="crisis-desc">나프타 부족으로 생산 차질 — 사재기가 아니라 공유가 해결책이에요</div>
      </div>
    </div>
    <div class="guide-row">
      <span style="font-size:20px">👆</span>
      <p>핀을 눌러 재고를 확인하고<br/><b>있어요 / 없어요</b> 신고해주세요</p>
    </div>
  </div>

  <div id="panel-store">
    <div class="store-top">
      <div class="store-brand-icon" id="s-icon">🏪</div>
      <div class="store-meta">
        <div class="store-name" id="s-name"></div>
        <div class="store-addr" id="s-addr"></div>
        <div class="store-dist" id="s-dist"></div>
      </div>
    </div>
    <div class="price-row" id="s-prices"></div>
    <div class="report-btns">
      <button class="btn-yes" onclick="report(true)">✅ 있어요!</button>
      <button class="btn-no"  onclick="report(false)">❌ 없어요</button>
    </div>
    <div class="report-status" id="s-status"></div>
  </div>
</div>

<script>
// 공공데이터 API 키
const GOV_KEY = 'LjADlALI7ELEclK5gANjfSIQMCeSiHmjAw7dGu15ZHCW5CmOhROkrVIKDZ9bNDQtW6pNZq3NCnSaYnAV6s%2BRmg%3D%3D';
const API_STORE = 'https://api.data.go.kr/openapi/tn_pubr_public_std_gar_bag_api';
const API_PRICE = 'https://api.data.go.kr/openapi/tn_pubr_public_weighted_envlp_api';

// 가격 폴백 데이터 (공공 API 실패 시)
const PRICES_FALLBACK = {
  "서울":{"5L":120,"10L":230,"20L":490,"50L":1140},
  "부산":{"5L":130,"10L":260,"20L":510,"50L":1190},
  "대구":{"5L":155,"10L":310,"20L":622,"50L":1470},
  "인천":{"5L":185,"10L":370,"20L":758,"50L":1790},
  "광주":{"5L":120,"10L":240,"20L":490,"50L":1140},
  "대전":{"5L":125,"10L":250,"20L":500,"50L":1170},
  "울산":{"5L":140,"10L":280,"20L":550,"50L":1290},
  "세종":{"5L":130,"10L":260,"20L":520,"50L":1230},
  "수원":{"5L":145,"10L":290,"20L":580,"50L":1360},
  "성남":{"5L":140,"10L":280,"20L":560,"50L":1310},
  "고양":{"5L":135,"10L":270,"20L":540,"50L":1260},
  "용인":{"5L":145,"10L":290,"20L":580,"50L":1360},
  "전주":{"5L":108,"10L":215,"20L":430,"50L":1010},
  "창원":{"5L":135,"10L":270,"20L":540,"50L":1260},
  "제주":{"5L":130,"10L":260,"20L":520,"50L":1220},
};
const PRICE_DEFAULT = {"5L":135,"10L":270,"20L":540,"50L":1270};

const ICONS = {
  "GS25":"🟢","CU":"🟡","세븐일레븐":"7️⃣","이마트24":"🔵","미니스톱":"🟠",
  "이마트":"🛒","롯데마트":"🛒","홈플러스":"🛒","코스트코":"🛒",
  "슈퍼":"🏬","마트":"🏬","주민센터":"🏛️","동사무소":"🏛️","행정복지센터":"🏛️"
};
const SEARCH_KEYWORDS = ['편의점', '슈퍼마켓', '마트', '주민센터'];

// 현재 지역 가격 캐시
let currentPrices = null;

let map, myMarker, currentLat = 37.5665, currentLng = 126.9780;
let activeStore = null, storeMarkers = [];
const reports = JSON.parse(localStorage.getItem('bongtu_v3') || '{}');

function initMap(lat, lng) {
  const container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(lat, lng),
    level: 4
  });
  currentLat = lat; currentLng = lng;

  const meEl = document.createElement('div');
  meEl.className = 'cmarker me';
  meEl.innerHTML = '📍';
  myMarker = new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(lat, lng),
    content: meEl, yAnchor: 1
  });
  myMarker.setMap(map);

  kakao.maps.event.addListener(map, 'click', showDefaultPanel);

  // 지도 이동 시 재검색 버튼 표시
  let dragTimer;
  const showReSearch = () => {
    clearTimeout(dragTimer);
    dragTimer = setTimeout(() => {
      document.getElementById('re-search-btn').style.display = 'block';
    }, 300);
  };
  kakao.maps.event.addListener(map, 'dragend', showReSearch);
  kakao.maps.event.addListener(map, 'zoom_changed', showReSearch);

  document.getElementById('loading').style.display = 'none';
  searchStores(lat, lng);
  setRegionPrice(lat, lng);
}

// 장소 검색
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const ps = new kakao.maps.services.Places();
  ps.keywordSearch(q, (data, status) => {
    if (status === kakao.maps.services.Status.OK && data.length > 0) {
      const { x, y, place_name } = data[0];
      const pos = new kakao.maps.LatLng(y, x);
      map.setCenter(pos);
      map.setLevel(4);
      searchStores(parseFloat(y), parseFloat(x));
      setRegionPrice(parseFloat(y), parseFloat(x));
      document.getElementById('re-search-btn').style.display = 'none';
      toast(`📍 ${place_name}`);
    } else {
      toast('검색 결과가 없어요');
    }
  });
}

// 현재 지도 중심으로 재검색
function reSearch() {
  const center = map.getCenter();
  const lat = center.getLat();
  const lng = center.getLng();
  searchStores(lat, lng);
  setRegionPrice(lat, lng);
  document.getElementById('re-search-btn').style.display = 'none';
  showDefaultPanel();
}

function locateUser() {
  const btn = document.getElementById('gps-btn');
  btn.textContent = '찾는 중...';
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      currentLat = lat; currentLng = lng;
      if (!map) {
        initMap(lat, lng);
      } else {
        map.setCenter(new kakao.maps.LatLng(lat, lng));
        myMarker.setPosition(new kakao.maps.LatLng(lat, lng));
        searchStores(lat, lng);
        setRegionPrice(lat, lng);
      }
      btn.textContent = '📍 내 위치';
    },
    () => {
      if (!map) initMap(37.5665, 126.9780);
      btn.textContent = '📍 내 위치';
      toast('위치 권한이 없어 서울로 설정했어요');
    },
    { timeout: 8000, enableHighAccuracy: true }
  );
}

function searchStores(lat, lng) {
  storeMarkers.forEach(m => m.setMap(null));
  storeMarkers = [];

  // 1) 현재 지역 파악 후 공공 API + 카카오 병렬 호출
  const geocoder = new kakao.maps.services.Geocoder();
  geocoder.coord2RegionCode(lng, lat, (result, status) => {
    const region = result?.find(r => r.region_type === 'H');
    const sido   = region?.region_1depth_name || '';
    const sigungu = region?.region_2depth_name || '';
    fetchOfficialStores(sido, sigungu, lat, lng);
  });

  // 2) 카카오 Places 병렬 실행
  const ps   = new kakao.maps.services.Places();
  const opts = { location: new kakao.maps.LatLng(lat, lng), radius: 800, size: 15 };
  const seen = new Set();
  let kakaoResults = [], done = 0;

  SEARCH_KEYWORDS.forEach(keyword => {
    ps.keywordSearch(keyword, (data, status) => {
      if (status === kakao.maps.services.Status.OK)
        data.forEach(s => { if (!seen.has(s.id)) { seen.add(s.id); kakaoResults.push(s); } });
      if (++done === SEARCH_KEYWORDS.length) {
        if (kakaoResults.length > 0) renderMarkers(kakaoResults, false);
        else toast('주변 판매처 정보를 불러오지 못했어요');
      }
    }, opts);
  });
}

// 공공데이터 공식 판매소 조회
async function fetchOfficialStores(sido, sigungu, lat, lng) {
  if (!sido) return;
  try {
    const url = `${API_STORE}?serviceKey=${GOV_KEY}&pageNo=1&numOfRows=100&type=json`
              + `&시도명=${encodeURIComponent(sido)}&시군구명=${encodeURIComponent(sigungu)}`;
    const res = await fetch(url);
    const json = await res.json();
    const items = json?.response?.body?.items?.item;
    if (!items || !items.length) return;

    // 위도/경도 있는 것만 필터 + 현재 위치 2km 이내
    const nearby = (Array.isArray(items) ? items : [items]).filter(s => {
      if (!s.위도 || !s.경도) return false;
      const d = Math.sqrt(Math.pow((s.위도-lat)*111000,2)+Math.pow((s.경도-lng)*88000,2));
      return d < 2000;
    });
    if (nearby.length > 0) renderMarkers(nearby, true);
    toast(`🏛️ 공식 판매소 ${nearby.length}곳 추가됨`);
  } catch(e) { /* 조용히 실패 */ }
}

function renderMarkers(stores, isOfficial = false) {
  stores.forEach(raw => {
    // 공공 API / 카카오 포맷 통일
    const store = isOfficial ? {
      id: raw.사업자등록번호 || (raw.위도 + raw.경도),
      place_name: raw.판매시설명 || raw.판매소명 || '공식 판매소',
      road_address_name: raw.소재지도로명주소 || '',
      address_name: raw.소재지지번주소 || '',
      x: String(raw.경도), y: String(raw.위도),
      phone: raw.전화번호 || '',
      distance: '',
      _official: true,
      _status: raw.영업상태명 || ''
    } : raw;

    const id = store.id || (store.y + store.x);
    const rep = reports[id];
    let colorClass = 'gray';
    if (rep && Date.now() - rep.time < 4 * 3600000)
      colorClass = rep.inStock ? 'green' : 'red';

    const name = store.place_name || '';
    const brand = Object.keys(ICONS).find(k => name.includes(k)) || '';
    const icon = isOfficial ? '🏛️' : (ICONS[brand] || (store.category_group_name?.includes('마트') ? '🛒' : '🏪'));

    const el = document.createElement('div');
    el.className = `cmarker ${colorClass}${isOfficial ? ' official' : ''}`;
    el.innerHTML = icon;
    if (isOfficial) el.title = '공식 지정 판매소';

    const marker = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(store.y, store.x),
      content: el, yAnchor: 1
    });
    marker.setMap(map);
    marker._store = store;
    marker._el = el;
    storeMarkers.push(marker);

    el.addEventListener('click', e => {
      e.stopPropagation();
      showStorePanel(store, marker);
    });
  });
  if (!isOfficial) toast(`주변 판매처 ${stores.length}곳 발견`);
}

function showStorePanel(store, marker) {
  activeStore = { ...store, _marker: marker };
  document.getElementById('panel-default').style.display = 'none';
  document.getElementById('panel-store').style.display = 'block';

  const brand = Object.keys(ICONS).find(k => store.place_name.includes(k)) || '';
  document.getElementById('s-icon').textContent = ICONS[brand] || (store.category_group_name?.includes('마트') ? '🛒' : '🏪');
  const officialBadge = store._official
    ? '<span style="background:#FFF4E0;color:#E07B00;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px">🏛️ 공식</span>'
    : '';
  document.getElementById('s-name').innerHTML = store.place_name + officialBadge;
  document.getElementById('s-addr').textContent = store.road_address_name || store.address_name;
  document.getElementById('s-dist').textContent = store.distance ? `📍 ${store.distance}m` : (store.phone ? `📞 ${store.phone}` : '');

  const p = currentPrices || PRICE_DEFAULT;
  document.getElementById('s-prices').innerHTML = Object.entries(p)
    .map(([sz, price]) => `
      <div class="p-chip">
        <span class="sz">${sz}</span>
        <span class="price">${price.toLocaleString()}원</span>
      </div>`).join('');

  const rep = reports[store.id];
  const statusEl = document.getElementById('s-status');
  if (rep) {
    const age = Math.round((Date.now() - rep.time) / 60000);
    const ageStr = age < 60 ? `${age}분 전` : `${Math.round(age/60)}시간 전`;
    statusEl.innerHTML = rep.inStock
      ? `🟢 재고 있음 신고 · ${ageStr}`
      : `🔴 품절 신고 · ${ageStr}`;
  } else {
    statusEl.textContent = '아직 신고 없음 — 첫 신고자가 되어주세요!';
  }
}

function showDefaultPanel() {
  activeStore = null;
  document.getElementById('panel-default').style.display = 'block';
  document.getElementById('panel-store').style.display = 'none';
}

function report(inStock) {
  if (!activeStore) return;
  reports[activeStore.id] = { inStock, time: Date.now() };
  localStorage.setItem('bongtu_v3', JSON.stringify(reports));
  if (activeStore._marker?._el)
    activeStore._marker._el.className = `cmarker ${inStock ? 'green' : 'red'}`;
  document.getElementById('s-status').innerHTML = inStock
    ? '🟢 재고 있음 · 방금 신고됨 ✓'
    : '🔴 품절 · 방금 신고됨 ✓';
  toast(inStock ? '✅ 재고 있음 신고 완료!' : '❌ 품절 신고 완료!');
}

function setRegionPrice(lat, lng) {
  const geocoder = new kakao.maps.services.Geocoder();
  geocoder.coord2RegionCode(lng, lat, async (result, status) => {
    if (status !== kakao.maps.services.Status.OK) return;
    const region = result.find(r => r.region_type === 'H');
    if (!region) return;
    const city  = region.region_1depth_name;
    const gu    = region.region_2depth_name;
    const label = gu ? `${city} ${gu}` : city;
    document.getElementById('region-label').textContent = label;

    // 공공 API로 공식 가격 조회
    let p = null;
    try {
      const url = `${API_PRICE}?serviceKey=${GOV_KEY}&pageNo=1&numOfRows=20&type=json`
                + `&CTPRVN_NM=${encodeURIComponent(city)}&SIGNGU_NM=${encodeURIComponent(gu)}`;
      const res  = await fetch(url);
      const json = await res.json();
      const items = json?.response?.body?.items?.item;
      const item  = Array.isArray(items) ? items[0] : items;
      if (item) {
        // 일반 가정용 봉투 가격 추출 (PRICE_5, PRICE_10, PRICE_20, PRICE_50 필드)
        p = {};
        if (item.PRICE_5)  p['5L']  = parseInt(item.PRICE_5);
        if (item.PRICE_10) p['10L'] = parseInt(item.PRICE_10);
        if (item.PRICE_20) p['20L'] = parseInt(item.PRICE_20);
        if (item.PRICE_50) p['50L'] = parseInt(item.PRICE_50);
        if (!Object.keys(p).length) p = null;
      }
    } catch(e) { /* 폴백 사용 */ }

    // 폴백: 하드코딩 가격
    if (!p) {
      const key = Object.keys(PRICES_FALLBACK).find(k => label.includes(k) || city.includes(k));
      p = key ? PRICES_FALLBACK[key] : PRICE_DEFAULT;
    }
    currentPrices = p;

    const bar = document.getElementById('price-bar');
    bar.innerHTML = `
      <div class="pb-row">
        <span class="pb-region">${label}</span>
        <span class="pb-sep">·</span>
        ${Object.entries(p).map(([sz, price]) =>
          `<span class="pb-item">${sz} <b>${price.toLocaleString()}원</b></span>`
        ).join('<span class="pb-sep"> | </span>')}
      </div>`;
    bar.style.display = 'block';
  });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { el.style.display = 'none'; }, 2500);
}

window.addEventListener('load', () => {
  if (window.kakaoLoadError || typeof kakao === 'undefined') {
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;padding:32px">
        <div style="font-size:40px;margin-bottom:16px">⚠️</div>
        <p style="font-size:16px;font-weight:700;color:#191F28;margin-bottom:8px">카카오 지도 도메인 등록 필요</p>
        <p style="font-size:13px;color:#6B7684;line-height:1.8;margin-bottom:20px">
          <a href="https://developers.kakao.com" target="_blank" style="color:#0064FF">developers.kakao.com</a> 에서<br/>
          앱 → 플랫폼 → Web → 도메인 추가:<br/>
          <code style="background:#F2F4F6;padding:4px 10px;border-radius:8px;color:#191F28;display:inline-block;margin-top:6px;font-size:13px">https://ssuksak.github.io</code>
        </p>
        <button onclick="location.reload()" style="background:#0064FF;color:#fff;border:none;border-radius:12px;padding:13px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">등록 후 새로고침</button>
      </div>`;
    return;
  }

  const fallback = setTimeout(() => { if (!map) initMap(37.5665, 126.9780); }, 5000);
  navigator.geolocation.getCurrentPosition(
    pos => {
      clearTimeout(fallback);
      initMap(pos.coords.latitude, pos.coords.longitude);
      document.getElementById('gps-btn').textContent = '📍 내 위치';
    },
    () => { clearTimeout(fallback); initMap(37.5665, 126.9780); },
    { timeout: 5000, enableHighAccuracy: false }
  );
});
</script>
