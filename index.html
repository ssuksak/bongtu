<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>봉투 어디 있어? 🗑️</title>
  <meta name="description" content="내 주변 종량제봉투 판매처 지도 — GPS로 찾기, 가격 확인, 재고 신고" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111; --card: #1e1e1e; --border: #333;
      --yellow: #f5c518; --green: #22c55e; --red: #ef4444; --text: #f0f0f0; --muted: #888;
    }
    html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* 상단 헤더 */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(17,17,17,0.95); backdrop-filter: blur(10px);
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    #header h1 { font-size: 17px; font-weight: 900; color: var(--yellow); flex: 1; }
    #header .sub { font-size: 12px; color: var(--muted); }
    #location-btn {
      background: var(--yellow); color: #000; border: none; border-radius: 8px;
      padding: 7px 12px; font-size: 12px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer; white-space: nowrap;
    }

    /* 지도 */
    #map { position: fixed; top: 56px; left: 0; right: 0; bottom: 180px; }

    /* 하단 패널 */
    #bottom-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: var(--card); border-top: 1px solid var(--border);
      height: 180px; padding: 14px 16px; overflow-y: auto;
    }
    #panel-default { text-align: center; padding-top: 20px; }
    #panel-default p { font-size: 14px; color: var(--muted); line-height: 1.7; }
    #panel-default strong { color: var(--yellow); }
    #panel-store { display: none; }
    .store-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .store-addr { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .price-tag {
      display: inline-block; background: #222; border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; font-size: 12px; margin-right: 6px; margin-bottom: 8px;
    }
    .price-tag span { color: var(--yellow); font-weight: 700; }
    .stock-row { display: flex; gap: 8px; margin-top: 4px; }
    .stock-btn {
      flex: 1; border: none; border-radius: 8px; padding: 10px; font-size: 13px;
      font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    }
    .stock-btn.yes { background: #14532d; color: #4ade80; }
    .stock-btn.no  { background: #450a0a; color: #f87171; }
    .stock-status {
      font-size: 12px; color: var(--muted); margin-top: 8px; text-align: center;
    }
    .stock-status .dot-green { color: var(--green); font-size: 16px; }
    .stock-status .dot-red   { color: var(--red);   font-size: 16px; }
    .stock-status .dot-gray  { color: var(--muted); font-size: 16px; }

    /* 범례 */
    #legend {
      position: fixed; bottom: 190px; right: 12px; z-index: 999;
      background: rgba(17,17,17,0.9); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; font-size: 11px; color: var(--muted);
    }
    #legend div { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
    #legend .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* 가격 배너 */
    #price-banner {
      position: fixed; bottom: 180px; left: 0; right: 100px; z-index: 999;
      padding: 0 12px;
    }
    #price-info {
      background: rgba(17,17,17,0.92); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; font-size: 12px; display: none;
    }
    #price-info .region { font-weight: 700; color: var(--yellow); }

    /* 로딩 오버레이 */
    #loading {
      position: fixed; inset: 0; z-index: 2000;
      background: var(--bg); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
    }
    #loading .emoji { font-size: 48px; animation: bounce 1s infinite; }
    #loading p { font-size: 14px; color: var(--muted); }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .leaflet-popup-content-wrapper { background: #1e1e1e; color: #f0f0f0; border: 1px solid #333; border-radius: 10px; }
    .leaflet-popup-tip { background: #1e1e1e; }
  </style>
</head>
<body>

<div id="loading">
  <div class="emoji">🗑️</div>
  <p>내 주변 판매처 찾는 중...</p>
</div>

<div id="header">
  <h1>봉투 어디 있어?</h1>
  <span class="sub" id="region-label">위치 확인 중</span>
  <button id="location-btn" onclick="locateUser()">📍 내 위치</button>
</div>

<div id="map"></div>

<div id="price-banner">
  <div id="price-info"></div>
</div>

<div id="legend">
  <div><span class="dot" style="background:#22c55e"></span> 재고 있음</div>
  <div><span class="dot" style="background:#ef4444"></span> 품절 신고</div>
  <div><span class="dot" style="background:#888"></span> 정보 없음</div>
</div>

<div id="bottom-panel">
  <div id="panel-default">
    <p>지도의 <strong>핀을 눌러</strong> 재고 상황을 확인하고<br />있어요 / 없어요 신고를 해주세요 🙏</p>
  </div>
  <div id="panel-store">
    <div class="store-name" id="s-name"></div>
    <div class="store-addr" id="s-addr"></div>
    <div id="s-prices"></div>
    <div class="stock-row">
      <button class="stock-btn yes" onclick="reportStock(true)">✅ 있어요!</button>
      <button class="stock-btn no"  onclick="reportStock(false)">❌ 없어요</button>
    </div>
    <div class="stock-status" id="s-status"></div>
  </div>
</div>

<script>
// ── 지역별 가격 데이터 ──────────────────────────────────────────
const PRICES = {
  "서울": { "10L": 230, "20L": 490, "50L": 1140 },
  "부산": { "10L": 260, "20L": 510, "50L": 1190 },
  "대구": { "10L": 310, "20L": 622, "50L": 1470 },
  "인천": { "10L": 370, "20L": 758, "50L": 1790 },
  "광주": { "10L": 240, "20L": 490, "50L": 1140 },
  "대전": { "10L": 250, "20L": 500, "50L": 1170 },
  "울산": { "10L": 280, "20L": 550, "50L": 1290 },
  "세종": { "10L": 260, "20L": 520, "50L": 1230 },
  "수원": { "10L": 290, "20L": 580, "50L": 1360 },
  "성남": { "10L": 280, "20L": 560, "50L": 1310 },
  "고양": { "10L": 270, "20L": 540, "50L": 1260 },
  "용인": { "10L": 290, "20L": 580, "50L": 1360 },
  "부천": { "10L": 300, "20L": 600, "50L": 1410 },
  "안산": { "10L": 310, "20L": 620, "50L": 1460 },
  "평택": { "10L": 300, "20L": 610, "50L": 1430 },
  "광명": { "10L": 340, "20L": 680, "50L": 1600 },
  "전주": { "10L": 220, "20L": 430, "50L": 1010 },
  "창원": { "10L": 270, "20L": 540, "50L": 1260 },
  "포항": { "10L": 280, "20L": 550, "50L": 1290 },
  "제주": { "10L": 260, "20L": 520, "50L": 1220 },
  "default": { "10L": 270, "20L": 540, "50L": 1270 },
};

// ── 상태 ──────────────────────────────────────────────────────
let map, userMarker, activeStore = null;
const reports = JSON.parse(localStorage.getItem('bongtu_reports') || '{}');

// ── 지도 초기화 ───────────────────────────────────────────────
function initMap(lat, lng) {
  map = L.map('map', { zoomControl: false }).setView([lat, lng], 15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 19
  }).addTo(map);

  // 내 위치 마커
  userMarker = L.circleMarker([lat, lng], {
    radius: 10, color: '#f5c518', fillColor: '#f5c518',
    fillOpacity: 0.9, weight: 3
  }).addTo(map).bindPopup('<b style="color:#f5c518">📍 내 위치</b>');

  map.on('click', () => showDefaultPanel());
  document.getElementById('loading').style.display = 'none';
}

// ── GPS 위치 확인 ─────────────────────────────────────────────
function locateUser() {
  document.getElementById('location-btn').textContent = '위치 확인 중...';
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      if (!map) {
        initMap(lat, lng);
        fetchStores(lat, lng);
        reverseGeocode(lat, lng);
      } else {
        map.setView([lat, lng], 15);
        userMarker.setLatLng([lat, lng]);
        fetchStores(lat, lng);
        reverseGeocode(lat, lng);
      }
      document.getElementById('location-btn').textContent = '📍 내 위치';
    },
    () => {
      // GPS 실패 시 서울 기본값
      if (!map) { initMap(37.5665, 126.9780); fetchStores(37.5665, 126.9780); }
      document.getElementById('location-btn').textContent = '📍 내 위치';
      document.getElementById('region-label').textContent = '서울 (기본값)';
      showPrice('서울');
      alert('위치 접근 권한이 없어요. 서울로 기본 설정했어요.');
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

// ── 역 지오코딩 (지역명 + 가격) ───────────────────────────────
async function reverseGeocode(lat, lng) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ko`,
      { headers: { 'Accept-Language': 'ko' } }
    );
    const d = await r.json();
    const city = d.address?.city || d.address?.county || d.address?.town || '알 수 없음';
    document.getElementById('region-label').textContent = city;
    // 가격 찾기
    const cityKey = Object.keys(PRICES).find(k => city.includes(k)) || 'default';
    showPrice(cityKey === 'default' ? city : cityKey);
  } catch(e) {}
}

function showPrice(region) {
  const p = PRICES[region] || PRICES['default'];
  const el = document.getElementById('price-info');
  el.innerHTML = `<span class="region">${region}</span> 봉투가격 ·
    10L <b style="color:#f5c518">${p['10L'].toLocaleString()}원</b> ·
    20L <b style="color:#f5c518">${p['20L'].toLocaleString()}원</b> ·
    50L <b style="color:#f5c518">${p['50L'].toLocaleString()}원</b>`;
  el.style.display = 'block';
}

// ── Overpass API로 편의점 조회 ────────────────────────────────
async function fetchStores(lat, lng) {
  const r = 1000; // 반경 1km
  const query = `[out:json][timeout:15];
    node["shop"="convenience"](around:${r},${lat},${lng});
    out body;`;
  try {
    const resp = await fetch(
      `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`
    );
    const data = await resp.json();
    renderStores(data.elements || []);
  } catch(e) {
    console.warn('Overpass API 오류:', e);
  }
}

// ── 마커 렌더링 ───────────────────────────────────────────────
function renderStores(stores) {
  // 기존 마커 제거
  map.eachLayer(l => { if (l._isStore) map.removeLayer(l); });

  stores.forEach(s => {
    const id = `store_${s.id}`;
    const name = s.tags?.name || s.tags?.brand || '편의점';
    const addr = [s.tags?.['addr:full'], s.tags?.['addr:street']].filter(Boolean).join(' ') || '주소 정보 없음';
    const report = reports[id];

    let color = '#888'; // 정보 없음
    if (report) {
      const age = Date.now() - report.time;
      if (age < 3 * 60 * 60 * 1000) { // 3시간 이내 신고만 유효
        color = report.inStock ? '#22c55e' : '#ef4444';
      }
    }

    const marker = L.circleMarker([s.lat, s.lon], {
      radius: 8, color, fillColor: color, fillOpacity: 0.85, weight: 2
    });
    marker._isStore = true;
    marker._storeData = { id, name, addr, lat: s.lat, lng: s.lon };
    marker.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      showStorePanel(marker._storeData);
    });
    marker.addTo(map);
  });
}

// ── 패널 표시 ─────────────────────────────────────────────────
function showStorePanel(store) {
  activeStore = store;
  const report = reports[store.id];
  document.getElementById('panel-default').style.display = 'none';
  document.getElementById('panel-store').style.display = 'block';
  document.getElementById('s-name').textContent = store.name;
  document.getElementById('s-addr').textContent = store.addr;

  // 가격 (지역 기준)
  const region = document.getElementById('region-label').textContent;
  const cityKey = Object.keys(PRICES).find(k => region.includes(k)) || 'default';
  const p = PRICES[cityKey] || PRICES['default'];
  document.getElementById('s-prices').innerHTML =
    Object.entries(p).map(([sz, price]) =>
      `<span class="price-tag">${sz} <span>${price.toLocaleString()}원</span></span>`
    ).join('');

  // 신고 현황
  const statusEl = document.getElementById('s-status');
  if (report) {
    const age = Math.round((Date.now() - report.time) / 60000);
    const dot = report.inStock ? '<span class="dot-green">●</span>' : '<span class="dot-red">●</span>';
    const txt = report.inStock ? '재고 있음' : '품절 신고됨';
    statusEl.innerHTML = `${dot} ${txt} · ${age}분 전 신고`;
  } else {
    statusEl.innerHTML = '<span class="dot-gray">●</span> 아직 신고 없음 — 첫 신고자가 되어주세요!';
  }
}

function showDefaultPanel() {
  activeStore = null;
  document.getElementById('panel-default').style.display = 'block';
  document.getElementById('panel-store').style.display = 'none';
}

// ── 재고 신고 ─────────────────────────────────────────────────
function reportStock(inStock) {
  if (!activeStore) return;
  reports[activeStore.id] = { inStock, time: Date.now() };
  localStorage.setItem('bongtu_reports', JSON.stringify(reports));

  // 마커 색 업데이트
  map.eachLayer(l => {
    if (l._isStore && l._storeData?.id === activeStore.id) {
      const color = inStock ? '#22c55e' : '#ef4444';
      l.setStyle({ color, fillColor: color });
    }
  });

  // 패널 업데이트
  const statusEl = document.getElementById('s-status');
  const dot = inStock ? '<span class="dot-green">●</span>' : '<span class="dot-red">●</span>';
  statusEl.innerHTML = `${dot} ${inStock ? '재고 있음' : '품절 신고됨'} · 방금 신고됨 ✓`;
}

// ── 시작 ──────────────────────────────────────────────────────
locateUser();
</script>
</body>
</html>
